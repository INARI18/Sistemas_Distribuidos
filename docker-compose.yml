# SUS data-integration simulation, Scenario A, as real containers.
#
#   sus-database   one central database (HTTP server)
#   health-post    the health posts -- scale this to as many as you like
#
# The posts can only reach the database over the Docker network; they have no
# route to one another, mirroring the proposal's isolated containers. Run it
# with the default 5 posts:
#
#   docker compose up --build
#
# ...or with any number of posts:
#
#   docker compose up --build --scale health-post=8
#
# The database does not need to be told how many posts there are: it prints the
# final metrics report to its logs once the posts go quiet, then every container
# exits on its own.

services:
  sus-database:
    build: .
    image: sus-sim:latest
    command: python db_server.py
    environment:
      PORT: "8000"
      # finalize after this many seconds with no incoming records
      IDLE_TIMEOUT: "${IDLE_TIMEOUT:-5}"
    ports:
      - "8000:8000"               # exposes GET /report on the host, optional
    restart: "no"

  health-post:
    build: .
    image: sus-sim:latest
    command: python post_runner.py
    depends_on:
      - sus-database
    environment:
      DATABASE_URL: "http://sus-database:8000"
      CONSULTATIONS: "${CONSULTATIONS:-200}"   # records each post generates
      BASE_SEED: "${BASE_SEED:-42}"            # shifts the whole population of posts
    deploy:
      replicas: ${POSTS:-5}        # default post count; --scale overrides this
    restart: "no"
